<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🚇メトロ占い</title>

<style>
body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans JP", sans-serif;
  margin:0; padding:24px; background:#faf7f2;
}
.card{
  max-width:720px;
  margin:0 auto;
  background:#fff;
  border-radius:16px;
  padding:20px;
  box-shadow:0 8px 30px rgba(0,0,0,.06);
}
h1{
  margin:0 0 8px;
  font-size:28px;
  display:flex;
  align-items:center;
  gap:10px;
}
p{margin:0 0 16px; line-height:1.6;}
label{display:block; font-weight:600; margin:14px 0 6px;}
input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}
button{
  margin-top:14px;
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:0;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  background:#111;
  color:#fff;
}
.result{
  margin-top:18px;
  padding:16px;
  border-radius:14px;
  background:#eef6ff;
  border:1px solid #cfe3ff;
}
.title{font-size:20px; font-weight:800; margin-bottom:8px;}

/* 相性：1行表示 */
.compat{
  margin-top:12px;
  padding:10px 12px;
  border-radius:10px;
  background:#fff;
  border:1px dashed #b7d4ff;
  font-weight:700;
}

/* 言語トグル：国旗→ピクト */
.lang-btn{
  margin-left:auto;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:40px;
  height:40px;
  border-radius:12px;
  border:1px solid #e6e6e6;
  background:#fff;
  cursor:pointer;
}
.lang-btn:hover{background:#f6f6f6;}
.lang-btn svg{width:20px; height:20px; display:block;}

/* 結果の画像 */
.line-hero{
  margin:10px 0 12px;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
  border:1px solid #dbe9ff;
}
.line-hero img{
  width:100%;
  height:auto;
  display:block;
}
</style>
</head>

<body>

<div class="card">
  <h1>
    <span id="h1text">🚇メトロ占い</span>

    <button class="lang-btn" id="langBtn" type="button" aria-label="Passer en français">
      <!-- 初期：JA画面 → FRに切り替えるアイコン（Aっぽい） -->
      <svg id="langIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M7 19h10" stroke="#111" stroke-width="2" stroke-linecap="round"/>
        <path d="M9 19l3-14 3 14" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10.2 14h3.6" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </h1>

  <p id="desc">
    あなたをパリのメトロ路線に例えて占います。<br>
    誕生日は <b>8桁</b>（例：19940714）で入力してください。
  </p>

  <label id="label">誕生日（8桁）</label>
  <input id="bday" maxlength="8" placeholder="19940714">
  <button id="btn">占う</button>

  <div id="out" class="result" style="display:none;"></div>
</div>

<script>
let lang = "ja";

const uiText = {
  ja: {
    h1: "🚇メトロ占い",
    desc: "あなたをパリのメトロ路線に例えて占います。<br>誕生日は <b>8桁</b>（例：19940714）で入力してください。",
    label: "誕生日（8桁）",
    btn: "占う",
    title: (id)=>`あなたは${id}番線`,
    alert8: "8桁で入力してください"
  },
  fr: {
    h1: "🚇 Horoscope Métro",
    desc: "Entrez votre date de naissance en 8 chiffres (ex : 19940714).",
    label: "Date (8 chiffres)",
    btn: "Diagnostiquer",
    title: (id)=>`Vous êtes la ligne ${id}`,
    alert8: "8 chiffres, s'il vous plaît"
  }
};

const lines = [
{id:1, ja:"観光客ばかり。パリジャンはもう自分たちの路線だと思っていない。シャトレでは時間を失うが、それも通常運転。", fr:"Touristes partout. Les Parisiens ne vous considèrent plus comme leur ligne. À Châtelet, on perd du temps. Normal.", best:6, worst:13},
{id:2, ja:"大通り沿いをなぞりながら疲れたパリを運ぶ。窓から見えるのは裏側ばかり。帰るために乗る路線。", fr:"Vous suivez les boulevards fatigués. Façades arrière. Une ligne pour rentrer.", best:5, worst:14},
{id:3, ja:"デモの下を通過。オペラも通るが忘れられる。雨のセーヌ色。", fr:"Sous les manifs. Passe par Opéra mais on oublie. Couleur Seine pluie.", best:9, worst:10},
{id:4, ja:"混沌。18時は生存戦。モンパルナスの後は記憶なし。車両だけは新しい。", fr:"Chaos. 18h survie. Après Montparnasse on ne sait plus. Rames neuves.", best:7, worst:12},
{id:5, ja:"駅と駅のあいだを運ぶ。避けられない北駅。革命は起きない。", fr:"Entre gares. Gare du Nord inévitable. Pas de révolution.", best:2, worst:1},
{id:6, ja:"左岸に便利。でもエッフェル塔の印象だけ。パッシーで存在が薄れる。", fr:"Pratique rive gauche. Mais Tour Eiffel seulement. À Passy, pas indispensable.", best:1, worst:11},
{id:7, ja:"ピンクの二重人格。観光から郊外へ。考えごとが増える距離。", fr:"Rose double personnalité. Du centre à la banlieue. Trajet pour réfléchir.", best:4, worst:14},
{id:8, ja:"良くも悪くもない。長い。クレテイユに池。", fr:"Ni bien ni mal. Long. Un lac à Créteil.", best:9, worst:6},
{id:9, ja:"誰も選ばない。通勤の象徴。いくつものパリを横断。", fr:"Personne ne choisit. Métro boulot. Plusieurs Paris.", best:8, worst:10},
{id:10, ja:"左岸の小宇宙。静かで人が少ない。", fr:"Petit monde rive gauche. Peu de monde.", best:12, worst:3},
{id:11, ja:"パリ色の茶。ベルヴィルで餃子。いつの間にか伸びた。", fr:"Couleur Paris. Raviolis à Belleville. Puis extension.", best:2, worst:6},
{id:12, ja:"カオス少なめ。坂が多い。ヴェルサイユではない。", fr:"Moins de chaos. Ça monte. Pas Versailles.", best:10, worst:4},
{id:13, ja:"悪名高い。怒る気力がなくなる。虚無。", fr:"Redoutée. On abandonne la colère. Vide.", best:5, worst:1},
{id:14, ja:"特別枠。ストでも動く。別のパリ。", fr:"À part. Même en grève. Autre Paris.", best:1, worst:2}
];

function hash(str){
  let h = 0;
  for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
  return h % lines.length;
}

function pad2(n){ return String(n).padStart(2, "0"); }
function lineImagePath(lineId){ return `assets/img/line-${pad2(lineId)}.jpg`; }

/* 画像が無いときは出さない（壊れない） */
function heroImageHTML(lineId){
  const src = lineImagePath(lineId);
  return `
    <div class="line-hero">
      <img src="${src}" alt="Ligne ${lineId}" onerror="this.closest('.line-hero').remove()">
    </div>
  `;
}

function renderUI(){
  const t = uiText[lang];
  document.documentElement.lang = lang;
  document.getElementById("h1text").textContent = t.h1;
  document.getElementById("desc").innerHTML = t.desc;
  document.getElementById("label").textContent = t.label;
  document.getElementById("btn").textContent = t.btn;

  // アイコン切替：今の言語→切替先を示す
  const icon = document.getElementById("langIcon");
  const btn = document.getElementById("langBtn");

  if(lang === "ja"){
    // FRへ切替（Aっぽい）
    icon.innerHTML = `
      <path d="M7 19h10" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M9 19l3-14 3 14" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M10.2 14h3.6" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    `;
    btn.setAttribute("aria-label", "Passer en français");
  }else{
    // JAへ切替（あっぽい）
    icon.innerHTML = `
      <path d="M6 8h12" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M8 12h8" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M7 16c2.5 0 3.5-1 5-3 1.5 2 2.5 3 5 3" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    `;
    btn.setAttribute("aria-label", "日本語に切り替え");
  }
}

document.getElementById("btn").onclick = () => {
  const v = document.getElementById("bday").value;
  const t = uiText[lang];

  if(!/^\d{8}$/.test(v)){ alert(t.alert8); return; }

  const r = lines[hash(v)];
  const text = (lang==="ja") ? r.ja : r.fr;

  // ★ここが要件：表記フォーマットを統一
  const bestText  = (lang==="ja") ? `${r.best}番線` : `Ligne ${r.best}`;
  const worstText = (lang==="ja") ? `${r.worst}番線` : `Ligne ${r.worst}`;
  const compatLine = (lang==="ja")
    ? `相性 ★★★ ${bestText} ／ ☆ ${worstText}`
    : `Compatibilité ★★★ ${bestText} ／ ☆ ${worstText}`;

  document.getElementById("out").style.display = "block";
  document.getElementById("out").innerHTML = `
    <div class="title">${t.title(r.id)}</div>
    ${heroImageHTML(r.id)}
    <div>${text}</div>
    <div class="compat">${compatLine}</div>
  `;
};

document.getElementById("langBtn").onclick = () => {
  lang = (lang === "ja") ? "fr" : "ja";
  renderUI();
};

renderUI();
</script>

</body>
</html>
