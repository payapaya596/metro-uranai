<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>パリ、メトロ占い</title>
  <meta name="description" content="あなたをパリのメトロ路線に例えて占います。誕生日8桁でサクッと診断。" />

  <style>
    :root{
      --bg:#faf7f2;
      --card:#fff;
      --ink:#111;
      --muted:#666;
      --accent:#1f6feb;
      --border:#ddd;
      --panel:#eef6ff;
      --panel-border:#cfe3ff;
      --dash:#b7d4ff;
    }
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      margin:0; padding:24px; background:var(--bg); color:var(--ink);
    }
    .card{
      max-width: 760px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,.06);
    }
    .lang-switch{
      text-align:right;
      margin-bottom:8px;
    }
    .lang-switch a{
      text-decoration:none;
      font-weight:600;
      font-size:13px;
      color:#111;
      border:1px solid #ddd;
      padding:4px 8px;
      border-radius:999px;
      background:#fff;
      display:inline-flex;
      align-items:center;
      gap:5px;
      cursor:pointer;
    }
    .flag{
      width:16px;
      height:11px;
    }
    h1{ margin:0 0 6px; font-size:28px; line-height:1.2; }
    p{ margin:0 0 16px; line-height:1.6; }
    label{ display:block; font-weight:600; margin:14px 0 6px; }
    input{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      font-size:16px;
      outline:none;
    }
    input:focus{ border-color: #b6c7ff; box-shadow: 0 0 0 3px rgba(31,111,235,.15); }
    .row{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    }
    button{
      margin-top: 14px;
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 0;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: var(--ink);
      color: #fff;
    }
    .hint{ color:var(--muted); font-size:13px; margin-top:6px; }
    .result{
      margin-top:18px;
      padding:16px;
      border-radius:14px;
      background: var(--panel);
      border:1px solid var(--panel-border);
    }
    .wrap{
      display:grid;
      grid-template-columns: 160px 1fr;
      gap: 14px;
      align-items:start;
    }
    .img{
      width:160px;
      height:160px;
      object-fit:contain;
      border-radius:14px;
      background:#fff;
      border:1px solid var(--panel-border);
    }
    @media (max-width: 520px){
      .wrap{ grid-template-columns: 1fr; }
      .img{ width:100%; height:220px; }
    }
    .title{
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 8px;
      display:flex;
      align-items:baseline;
      gap:10px;
      flex-wrap:wrap;
    }
    .badge{
      display:inline-block;
      font-weight:900;
      font-size:12px;
      padding: 4px 10px;
      border-radius: 999px;
      border:1px solid #d7e6ff;
      background:#fff;
      color:#0b3a7a;
    }
    .text{
      line-height: 1.85;
      font-size: 16px;
      white-space: normal;
      word-break: break-word;
    }
    .compat{
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fff;
      border: 1px dashed var(--dash);
      font-size: 14px;
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .stars{
      display:inline-flex;
      gap:2px;
      font-size: 16px;
      line-height:1;
      transform: translateY(1px);
    }
    .star{
      display:inline-block;
      width: 1em;
      text-align:center;
    }
    .star.filled{ color:#111; }
    .star.empty{ color:#c7c7c7; }
    .pair{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }
    .pair .label{
      font-weight:900;
      letter-spacing:.02em;
    }
    .pair .value{
      font-weight:800;
    }
    /* ===== メトロアニメーション ===== */
    .metro-scene {
      max-width: 760px;
      margin: 14px auto 0;
      height: 72px;
      overflow: hidden;
      position: relative;
    }
    .metro-train {
      position: absolute;
      bottom: 0;
      left: 0;
      animation: trainRide 6s linear infinite;
    }
    @keyframes trainRide {
      from { transform: translateX(-560px); }
      to   { transform: translateX(900px); }
    }
  </style>
</head>

  // ====== ロジック ======
  let lang = "ja"; // "ja" or "fr"

  function hashToIndex(str, mod) {
    let h = 0;
    for (let i = 0; i < str.length; i++) {
      h = (h * 31 + str.charCodeAt(i)) >>> 0;
    }
    return h % mod;
  }

  function esc(s){
    return String(s ?? "").replace(/[&<>"']/g, (c) => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  function starsHTML(n, outOf=3){
    const filled = Math.max(0, Math.min(outOf, n));
    const empty = Math.max(0, outOf - filled);
    let html = `<span class="stars" aria-label="${filled} sur ${outOf}">`;
    for(let i=0;i<filled;i++) html += `<span class="star filled">★</span>`;
    for(let i=0;i<empty;i++) html += `<span class="star empty">★</span>`;
    html += `</span>`;
    return html;
  }

      h1.textContent = "🚇Vous êtes quelle ligne ?";
      lead.innerHTML = `On vous attribue une ligne du métro parisien.<br>Entrez votre date de naissance en <b>8 chiffres</b> (ex : 19940714).`;
      lbl.textContent = "Date de naissance (8 chiffres)";
      hint.textContent = "※ chiffres uniquement";
      btn.textContent = "Découvrir ma ligne🚇";
      langBtn.innerHTML = `<img src="https://flagcdn.com/jp.svg" class="flag" alt="JP"> 日本語`;
    }
  }

  function renderResult(r){
    const out = document.getElementById("out");
    out.style.display = "block";

    const title = (lang === "ja")
      ? `あなたは${r.id}番線`
      : `Vous êtes la ligne ${r.id}`;

    const text = (lang === "ja") ? r.ja : r.fr;

    // 相性（UI要素として 1行）
    // パン占い同様「★★★ / ☆」を、HTMLの星で表示
    const compatLabelBest = (lang === "ja") ? "相性" : "Compatibilité";
    const bestValue = (lang === "ja") ? `${r.best}番線` : `Ligne ${r.best}`;
    const worstValue = (lang === "ja") ? `${r.worst}番線` : `Ligne ${r.worst}`;

    const imgHTML = r.img
      ? `<img class="img" src="${esc(r.img)}" alt="Ligne ${esc(r.id)}">`
      : `<div class="img" aria-hidden="true" style="display:flex;align-items:center;justify-content:center;font-weight:900;color:#0b3a7a;">Ligne ${esc(r.id)}</div>`;

    out.innerHTML = `
      <div class="wrap">
        ${imgHTML}
        <div>
          <div class="title">${esc(title)} <span class="badge">Ligne ${esc(r.id)}</span></div>
          <div class="text">${esc(text)}</div>
          <div class="compat" role="group" aria-label="${esc(compatLabelBest)}">
            <div class="pair">
              <span class="label">${esc(compatLabelBest)}</span>
            </div>
            <div class="pair">
              ${starsHTML(3,3)} <span class="value">${esc(bestValue)}</span>
            </div>
            <div class="pair">
              ${starsHTML(1,3)} <span class="value">${esc(worstValue)}</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  document.getElementById("langBtn").addEventListener("click", () => {
    lang = (lang === "ja") ? "fr" : "ja";
    setUI();

    // すでに結果が出ているなら同じ路線で再描画
    const out = document.getElementById("out");
    if(out.style.display !== "none"){
      const val = document.getElementById("bday").value.trim();
      if(/^\d{8}$/.test(val)){
        const r = LINES[hashToIndex(val, LINES.length)];
        renderResult(r);
      }
    }
  });

  document.getElementById("btn").addEventListener("click", () => {
    const val = document.getElementById("bday").value.trim();
    if(!/^\d{8}$/.test(val)){
      alert(lang === "ja" ? "8桁の数字で入力してください" : "Veuillez saisir 8 chiffres.");
      return;
    }
    const r = LINES[hashToIndex(val, LINES.length)];
    renderResult(r);
  });

  // 初期化
  setUI();

  // 路線番号に応じて電車の色を変える
  const LINE_COLORS = {
    "1":"#f3d11e","2":"#003399","3":"#9b9600","3bis":"#98d4e2","4":"#bc5aa2",
    "5":"#ff7e2e","6":"#78be20","7":"#fa9ab5","7bis":"#82c8e6","8":"#ceadd2",
    "9":"#d5c900","10":"#c9910d","11":"#704b1c","12":"#00814f",
    "13":"#6ec4b0","14":"#662d91"
  };

  function updateTrainColor(lineId) {
    const color = LINE_COLORS[lineId] || "#00B1AC";
    document.querySelectorAll(".train-body").forEach(el => {
      el.setAttribute("fill", color);
    });
    // アニメーションをリスタート
    const train = document.getElementById("metroTrain");
    if (train) {
      train.style.animation = "none";
      train.offsetHeight;
      train.style.animation = "";
    }
  }

  document.getElementById("btn").addEventListener("click", () => {
    const val = document.getElementById("bday").value.trim();
    if(!/^\d{8}$/.test(val)) return;
    const r = LINES[hashToIndex(val, LINES.length)];
    setTimeout(() => updateTrainColor(r.id), 50);
  });
</script>
</body>
</html>
